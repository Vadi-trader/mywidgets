<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Market Widgets</title>
</head>
<body>
    <!-- USD/TRY -->
    <div id="widget_usdtry">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
            {
                "symbol": "FX:USDTRY",
                "colorTheme": "light",
                "isTransparent": false,
                "locale": "en",
                "width": "100%"
            }
            </script>
        </div>
    </div>

    <!-- XAU/TRY (золото) -->
    <div id="widget_xau_try">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
            {
                "symbol": "FX:XAUTRYG",
                "colorTheme": "light",
                "isTransparent": false,
                "locale": "en",
                "width": "100%"
            }
            </script>
        </div>
    </div>

    <!-- Brent Crude Oil -->
    <div id="widget_brent">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
            {
                "symbol": "TVC:BRENT",
                "colorTheme": "light",
                "isTransparent": false,
                "locale": "en",
                "width": "100%"
            }
            </script>
        </div>
    </div>
</body>
</html>
